services:
  broker:
    image: apache/kafka:4.1.1
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.1.1
    depends_on:
      broker:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -ec
      - |
        for topic in clickstream-events alerts-notifications batch-results; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server broker:29092 \
            --create \
            --if-not-exists \
            --topic "$${topic}" \
            --partitions 3 \
            --replication-factor 1;
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --list
    restart: "no"

  spark-master:
    image: apache/spark:4.1.1
    container_name: spark-master
    environment:
      HOME: /tmp
      PYTHONPATH: /opt/pipeline
      SPARK_SUBMIT_OPTS: -Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "-h",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080"
      ]
    ports:
      - "7077:7077"
      - "8085:8080"
      - "4040:4040"
    volumes:
      - ./:/opt/pipeline
      - spark_ivy:/opt/spark/.ivy2
      - spark_checkpoints:/opt/spark/checkpoints
    restart: unless-stopped

  spark-worker:
    image: apache/spark:4.1.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      HOME: /tmp
      PYTHONPATH: /opt/pipeline
      SPARK_SUBMIT_OPTS: -Divy.home=/opt/spark/.ivy2 -Divy.cache.dir=/opt/spark/.ivy2/cache
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    volumes:
      - ./:/opt/pipeline
      - spark_ivy:/opt/spark/.ivy2
      - spark_checkpoints:/opt/spark/checkpoints
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 10s
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/clickstream-lake
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.27.6
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/pipeline/airflow/dags
      AIRFLOW__CORE__FERNET_KEY: 04VgFYBDheYCEGguaknpjvmRVCzrSk2fN7hbrYEEkgc=
      AIRFLOW__API__AUTH_BACKENDS: airflow.api_fastapi.auth.backend.session
      AIRFLOW__SMTP__SMTP_HOST: mailpit
      AIRFLOW__SMTP__SMTP_PORT: 1025
      AIRFLOW__SMTP__SMTP_MAIL_FROM: airflow@example.com
      AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_TOPIC: clickstream-events
      ALERTS_TOPIC: alerts-notifications
      BATCH_RESULTS_TOPIC: batch-results
      SPARK_MASTER: spark://spark-master:7077
      SPARK_EXTRA_PACKAGES: org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,io.delta:delta-spark_2.13:4.0.0,org.apache.hadoop:hadoop-aws:3.4.2
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_LAKE_PATH: s3a://clickstream-lake
      SPARK_CHECKPOINT_BASE: /opt/spark/checkpoints
      LOCAL_REPORT_DIR: /opt/airflow/reports
      REPORT_EMAIL_TO: reports@example.com
      FLASH_SALE_VIEW_THRESHOLD: 100
      FLASH_SALE_PURCHASE_THRESHOLD: 5
      FLASH_SALE_WINDOW_DURATION: 10 minutes
      FLASH_SALE_SLIDE_DURATION: 1 minute
      KAFKA_STARTING_OFFSETS: earliest
      PYTHONPATH: /opt/pipeline
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    user: "0:0"
    volumes:
      - ./:/opt/pipeline
      - airflow_logs:/opt/airflow/logs
      - airflow_reports:/opt/airflow/reports
    entrypoint:
      - /bin/bash
      - -ec
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/reports
        chown -R airflow:root /opt/airflow/logs /opt/airflow/reports
        su airflow -c 'airflow db migrate'
        su airflow -c 'airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com'
    restart: "no"

  airflow-api-server:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    command: api-server
    ports:
      - "8087:8080"
    volumes:
      - ./:/opt/pipeline
      - airflow_logs:/opt/airflow/logs
      - airflow_reports:/opt/airflow/reports
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    command: scheduler
    volumes:
      - ./:/opt/pipeline
      - airflow_logs:/opt/airflow/logs
      - airflow_reports:/opt/airflow/reports
    restart: unless-stopped

  airflow-dag-processor:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    command: dag-processor
    volumes:
      - ./:/opt/pipeline
      - airflow_logs:/opt/airflow/logs
      - airflow_reports:/opt/airflow/reports
    restart: unless-stopped

volumes:
  airflow_logs:
  airflow_reports:
  kafka_data:
  minio_data:
  postgres_data:
  spark_checkpoints:
  spark_ivy:
