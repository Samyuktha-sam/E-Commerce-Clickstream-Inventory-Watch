  #     - default

  kafka-ui:
    image: kafbat/kafka-ui:main
    ports:
      - 8084:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
    depends_on:
      - broker
    networks:
      - kafka-network

  spark-master:
    image: apache/spark:4.1.1
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - HOME=/tmp
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
        -Divy.cache.dir=/opt/spark/.ivy2/cache
    ports:
      - "8085:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./stream_layer:/opt/spark/work-dir
      - ./cache/checkpoints:/opt/spark/checkpoints
      - ./stream_layer/spark_stream_processor.py:/opt/spark/work-dir/spark_stream_processor.py
      - ./stream_layer/test.py:/opt/spark/work-dir/test.py
      - ./stream_layer/spark_raw_sink.py:/opt/spark/work-dir/spark_raw_sink.py
      - spark-data:/tmp
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/localhost/7077 >/dev/null 2>&1 || exit 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "-h",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080",
      ]
    networks:
      - spark-network
      - default
    restart: always

  spark-worker:
    image: apache/spark:4.1.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - HOME=/tmp
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
        -Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./cache/checkpoints:/opt/spark/checkpoints
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
      ]
    networks:
      - spark-network
      - default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/spark-master/7077 >/dev/null 2>&1 || exit
            1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    # S3-compatible object storage
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: [ "CMD", "mc", "-ready", "local" ]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 20s
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - default

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
        until mc --insecure alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
        mc --insecure mb local/clickstream-lake || true;
        mc --insecure policy set none local/clickstream-lake || true;
        echo "MinIO bucket clickstream-lake ensured";
        '
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - default
    restart: "no"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mc --insecure alias set local http://minio:9000
            ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}
            >/dev/null 2>&1 && mc --insecure ls local/clickstream-lake
            >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
