  #     --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,org.apache.hadoop:hadoop-aws:3.4.2
  #     --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
  #     --conf spark.hadoop.fs.s3a.access.key=${MINIO_ACCESS_KEY}
  #     --conf spark.hadoop.fs.s3a.secret.key=${MINIO_SECRET_KEY}
  #   restart: always
  #   networks:
  #     - spark-network
  #     - default-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "nc -z localhost 15002"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  spark-worker:
    # image: apache/spark:4.1.1
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-8}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-8g}
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
      - Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./cache/checkpoints:/opt/spark/checkpoints
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
      ]
    networks:
      - spark-network
      - default-net
    restart: always

  # endregion
  # region minio

  minio:
    image: minio/minio:latest
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "-ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 20s
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - default-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
        until mc --insecure alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
        mc --insecure mb local/clickstream-lake || true;
        mc --insecure policy set none local/clickstream-lake || true;
        echo "MinIO bucket clickstream-lake ensured";
        '
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - default-net
    restart: "no"
