volumes:
  minio_data:
  kafka_data:
  spark-data:
  spark-ivy-cache:
  postgres-db-volume:

networks:
  spark-network:
    driver: bridge
  default-net:
    driver: bridge
  kafka-network:
    driver: bridge
  airflow-net:
    driver: bridge
