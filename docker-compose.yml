services:
  # region kafka
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - default-net
      - kafka-network

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    entrypoint: >
      /bin/bash -c '
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $${KAFKA_BOOTSTRAP_SERVERS} --create --if-not-exists --topic clickstream-events --partitions 1 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $${KAFKA_BOOTSTRAP_SERVERS} --create --if-not-exists --topic alerts-notifications --partitions 1 --replication-factor 1;
      '
    networks:
      - kafka-network
    restart: "no"

  kafka-ui:
    image: kafbat/kafka-ui:main
    ports:
      - 8084:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
    depends_on:
      - broker
    networks:
      - kafka-network

  # endregion
  # region spark
  spark-master:
    # image: apache/spark:4.1.1
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    ports:
      - "${SPARK_MASTER_UI_PORT:-8085}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
      - Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./cache/checkpoints:/opt/spark/checkpoints
      - ./stream_layer/:/opt/spark/work-dir/
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "-h",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080",
      ]
    networks:
      - spark-network
      - default-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  spark-connect:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-connect
    hostname: spark-connect
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "${SPARK_CONNECT_PORT:-15002}:15002"
      - "${SPARK_DRIVER_UI_PORT:-4040}:4040"
    environment:
      - SPARK_MODE=connect
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_CONNECT_LISTEN_ADDRESS=0.0.0.0
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
      - Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./cache/checkpoints:/opt/spark/checkpoints
    command: >
      /opt/spark/sbin/start-connect-server.sh 
      --master spark://spark-master:7077 
      --conf spark.driver.bindAddress=0.0.0.0
      --conf spark.cores.max=2
    restart: always
    networks:
      - spark-network
      - default-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15002"]
      interval: 10s
      timeout: 5s
      retries: 3

  spark-worker:
    # image: apache/spark:4.1.1
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-8}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-8g}
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/spark/.ivy2
      - Divy.cache.dir=/opt/spark/.ivy2/cache
    volumes:
      - ./cache/ivy:/opt/spark/.ivy2
      - ./cache/checkpoints:/opt/spark/checkpoints
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
      ]
    networks:
      - spark-network
      - default-net
    restart: always

  # endregion
  # region minio

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "-ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 20s
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - default-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
        until mc --insecure alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
        mc --insecure mb local/clickstream-lake || true;
        mc --insecure policy set none local/clickstream-lake || true;
        echo "MinIO bucket clickstream-lake ensured";
        '
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - default-net
    restart: "no"
  # endregion
  # region airflow

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --role Admin --firstname Admin --lastname User --email admin@example.com"
    networks:
      - airflow-net

  # CRITICAL: In Airflow 3, this is the internal engine tasks talk to.
  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-api-server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "04VgFYBDheYCEGguaknpjvmRVCzrSk2fN7hbrYEEkgc="
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth"
    command: api-server
    networks:
      - airflow-net
    restart: always

  # NEW: This serves the actual User Interface (Dashboard)
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      airflow-api-server:
        condition: service_started
    ports:
      - "8087:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "04VgFYBDheYCEGguaknpjvmRVCzrSk2fN7hbrYEEkgc="
      AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
      AIRFLOW__API__AUTH_JWT_SECRET_KEY: "at_least_64_characters_long_random_string_for_security_purposes_12345"
      AIRFLOW__CORE__HOSTNAME: "airflow-webserver"
    command: api-server
    networks:
      - airflow-net
    restart: always

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-api-server:
        condition: service_started
    environment:
      AIRFLOW__CORE__HOSTNAME: "airflow-scheduler"  
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__API__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution"
      AIRFLOW__CORE__FERNET_KEY: "04VgFYBDheYCEGguaknpjvmRVCzrSk2fN7hbrYEEkgc="
      AIRFLOW__API__AUTH_JWT_SECRET_KEY: "at_least_64_characters_long_random_string_for_security_purposes_12345"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: scheduler
    networks:
      - airflow-net
    ports:
      - "8793:8793"
    restart: always

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: dag-processor
    depends_on:
      airflow-api-server:
        condition: service_started
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "04VgFYBDheYCEGguaknpjvmRVCzrSk2fN7hbrYEEkgc="
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: dag-processor
    networks:
      - airflow-net
    restart: always
  # endregion

volumes:
  minio_data:
  kafka_data:
  spark-data:
  spark-ivy-cache:
  postgres-data:

networks:
  spark-network:
    driver: bridge
  default-net:
    driver: bridge
  kafka-network:
    driver: bridge
  airflow-net:
    driver: bridge
