# Master
spark.master                           spark://spark-master:7077

# Event Logging + History Server
spark.eventLog.enabled                 true
spark.eventLog.dir                     /opt/spark/events
spark.history.fs.logDirectory          /opt/spark/events
spark.history.ui.port                  18080

# Warehouse
spark.sql.warehouse.dir                /opt/spark/spark-warehouse

# S3 / MinIO
spark.hadoop.fs.s3a.endpoint           http://minio:9000
spark.hadoop.fs.s3a.impl               org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.access.key         minioadmin
spark.hadoop.fs.s3a.secret.key         minioadmin
spark.hadoop.fs.s3a.path.style.access  true

# Permissions
spark.hadoop.fs.permissions.umask-mode 002

# Nice-to-have
spark.eventLog.compress                true
spark.history.retainedApplications     50

# Dynamic Allocation (this is the key for "serverless")
spark.dynamicAllocation.enabled                  true
spark.dynamicAllocation.minExecutors            0
spark.dynamicAllocation.initialExecutors        1
spark.dynamicAllocation.maxExecutors            8
spark.dynamicAllocation.executorIdleTimeout     2m
spark.dynamicAllocation.cachedIdleTimeout       5m

spark.driver.memory                    1g
spark.executor.memory                  2g
spark.executor.cores                   2